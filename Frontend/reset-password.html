<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-box">

      <div class="logo">
        <span class="logo-icon">🔒</span>
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div id="reset-section">
        <div class="input-group">
          <label>New Password</label>
          <input type="password" id="new-password" placeholder="Enter new password" />
        </div>
        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm new password" />
        </div>
        <div id="reset-error" class="error-msg"></div>
        <button class="btn-primary" onclick="resetPassword()">Reset Password</button>
      </div>

      <div id="success-section" class="hidden" style="text-align:center; padding: 20px 0;">
        <div style="font-size: 48px;">✅</div>
        <h3 style="margin: 16px 0 8px; color: #22c55e;">Password Reset!</h3>
        <p style="color: #6b7280; margin-bottom: 24px;">Your password has been updated successfully.</p>
        <button class="btn-primary" onclick="window.location.href='index.html'">Go to Login</button>
      </div>

    </div>
  </div>

  <script>
    const API = 'https://expense-tracker-backend-utj8.onrender.com';

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('reset-error').textContent = 'Invalid reset link';
    }

    async function resetPassword() {
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const errorDiv = document.getElementById('reset-error');
      errorDiv.textContent = '';

      if (!newPassword || !confirmPassword) {
        errorDiv.textContent = 'Please fill in both fields';
        return;
      }

      if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        return;
      }

      if (newPassword.length < 6) {
        errorDiv.textContent = 'Password must be at least 6 characters';
        return;
      }

      try {
        const res = await fetch(API + '/api/password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message || 'Reset failed';
          return;
        }

        // Show success
        document.getElementById('reset-section').classList.add('hidden');
        document.getElementById('success-section').classList.remove('hidden');

      } catch (err) {
        errorDiv.textContent = 'Something went wrong. Try again.';
      }
    }
  </script>

</body>
</html>
